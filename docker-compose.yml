services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umbra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-umbra}
      POSTGRES_DB: umbra
    volumes:
      - umbra_pgdata:/var/lib/postgresql/data
    ports:
      # Exposed locally for psql / admin tools; remove in production.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbra -d umbra"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://umbra:${POSTGRES_PASSWORD:-umbra}@db:5432/umbra
      WCL_CLIENT_ID: ${WCL_CLIENT_ID}
      WCL_CLIENT_SECRET: ${WCL_CLIENT_SECRET}
      WCL_MPLUS_ZONE_ID: ${WCL_MPLUS_ZONE_ID:-47}
      API_KEY: ${API_KEY}
      RATE_LIMIT_PUBLIC: ${RATE_LIMIT_PUBLIC:-60/minute}
      RATE_LIMIT_PLAYER_LOOKUP: ${RATE_LIMIT_PLAYER_LOOKUP:-20/minute}
    ports:
      - "8000:8000"

volumes:
  umbra_pgdata:
