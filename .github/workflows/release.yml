name: Release addon

# Runs on a pushed semver tag (e.g. v0.3.4). Packages the Umbra/ folder
# via BigWigs packager and uploads to CurseForge + Wago simultaneously,
# plus creates a GitHub Release with the zip attached.
#
# Release flow:
#   1. Promote dev -> live (python scripts/promote-addon.py).
#   2. Bump ## Version: in Umbra/Umbra.toc (and Umbra-dev/Umbra.toc to match).
#   3. Update Umbra/CHANGELOG.md with the new version section.
#   4. Commit the version bump.
#   5. git tag v0.3.4 && git push origin v0.3.4
#   6. Workflow runs automatically. Check Actions tab for status.
#
# Required GitHub repo secrets:
#   - CF_API_KEY: https://legacy.curseforge.com/account/api-tokens
#   - WAGO_API_TOKEN: https://addons.wago.io/account/apikeys
#
# Note: the hourly refresh-addon-data workflow keeps the direct-download
# zip fresh with latest UmbraData.lua, but does NOT push to CF/Wago. Only
# versioned tag releases do that. CF/Wago users get bundled data at the
# version they installed, refreshed whenever a new tag is cut.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # packager creates GitHub releases + uploads zip as asset

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Packager needs full history to resolve changelog + version info.
          fetch-depth: 0

      - name: Stage Umbra/ as a standalone git checkout for packager
        # The packager's file discovery uses `git ls-files`, which reads
        # the repo index. In our monorepo, the index tracks backend/,
        # frontend/, docs/, etc. — none of which belong in the addon zip.
        # Initializing a fresh git repo inside Umbra/ scopes ls-files to
        # just the addon files, which is what the packager expects.
        run: |
          set -euo pipefail
          cd Umbra
          git init -q -b main
          git config user.email "ci@wowumbra.gg"
          git config user.name "Umbra CI"
          git add -A
          git commit -q -m "Release ${GITHUB_REF_NAME}"
          git tag "${GITHUB_REF_NAME}"

      - name: Package and upload to CurseForge + Wago
        uses: BigWigsMods/packager@master
        with:
          # -l sets the release label shown in addon managers. Default is
          # just "v0.3.4"; we prefix "Umbra " so users see "Umbra v0.3.4"
          # and have context for which addon is updating.
          args: -t Umbra -l "Umbra ${{ github.ref_name }}"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Announce release in Discord
        # Posts a release embed to the #announcements channel via webhook.
        # No-ops silently if DISCORD_RELEASE_WEBHOOK isn't configured, so
        # forks and pre-webhook tags don't error out.
        #
        # We read the CHANGELOG from the repo root (not the staged Umbra/
        # checkout, which was re-init'd for the packager step), extracting
        # the entry for the just-tagged version.
        if: always() && !cancelled()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          VERSION: ${{ github.ref_name }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_RELEASE_WEBHOOK not set; skipping announcement."
            exit 0
          fi

          VERSION_NO_V="${VERSION#v}"
          # Pull the body of the current version's CHANGELOG entry: every
          # line after "## [x.y.z]" up to (but not including) the next
          # "## " heading. Uses substr() instead of regex to dodge the
          # gawk-vs-mawk `\[` escape warning (some awks strip the
          # backslash and read `[0.3.10]` as a character class).
          awk -v v="$VERSION_NO_V" '
            {
              marker = "## [" v "]"
              if (substr($0, 1, length(marker)) == marker) {
                in_section = 1; next
              }
              if (in_section && substr($0, 1, 3) == "## ") exit
              if (in_section) print
            }
          ' Umbra/CHANGELOG.md > /tmp/changelog_body.txt

          python3 <<'PY'
          import json, os
          with open("/tmp/changelog_body.txt") as f:
              body = f.read().strip()
          # Discord embed description limit is 4096 chars; stay well under.
          if len(body) > 3500:
              body = body[:3500].rstrip() + "\n..."
          version = os.environ["VERSION"]
          if not body:
              body = "See the GitHub release for notes."
          payload = {
              "embeds": [{
                  "title": f"Umbra {version} released",
                  "description": body,
                  "url": f"https://github.com/mooyah04/Umbra/releases/tag/{version}",
                  "color": 0x8A2BE2,  # Umbra purple
                  "footer": {"text": "wowumbra.gg"},
              }]
          }
          with open("/tmp/payload.json", "w") as f:
              json.dump(payload, f)
          PY

          curl -sfS -H "Content-Type: application/json" \
               -d "@/tmp/payload.json" \
               "$DISCORD_WEBHOOK"
          echo
          echo "Posted release announcement for ${VERSION}."
